version: "3.8"

services:

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Bangkok
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway" # สำคัญมาก! เพื่อให้ n8n คุยกับ Ollama ในเครื่องได้
    networks:
      - second-brain-network

  # Qdrant Vector Database for GraphRAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: second-brain-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ENABLE_TLS=false
    restart: unless-stopped
    networks:
      - second-brain-network

volumes:
  n8n_data:
  qdrant_data:

networks:
  second-brain-network:
    driver: bridge